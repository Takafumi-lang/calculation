<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗算：２桁×２桁</title>
<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body {
    width: 100vw;
    height: 100vh;
    position: relative;
}
.left {
    width: 50%;
    height: 100%;
    position: absolute;
    left: 0;
    border-right: 1px solid #000;
}
.record {
    width: 100%;
    height: 15%;
    position: absolute;
    top: 0;
    display: flex; 
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
#record {
    font-size: 30px;
    color: red;
    visibility: hidden;
}
#highscore-display {
    font-size: 18px;
    color: #555;
    margin-top: 5px;
}
.question {
    width: 100%;
    height: 20%;
    position: absolute;
    top: 15%;
}
.formula {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
}
#times {
    margin: 0 50px;
}
.answer {
    width: 100%;
    height: 20%;
    position: absolute;
    top: 35%;
    display: flex;
}
.equal {
    position: absolute;
    top: 50%;
    left: 10%;
    transform: translateY(-50%);
    font-size: 40px;
}
#answer-box {
    width: 50%;
    height: 40px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid #000;
    border-radius: 5px;
    font-size: 35px;
}
input[type=number]::-webkit-inner-spin-button, 
input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
}
.right {
    width: 50%;
    height: 100%;
    position: absolute;
    right: 0;
    border-left: 1px solid #000;
}
.evaluation {
    width: 100%;
    height: 30%;
    position: absolute;
    top: 0;
    display: none;
}
#evaluation {
    font-size: 5rem;
    white-space: nowrap;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: blue;
}
.correct {
    width: 100%;
    height: 10%;
    position: absolute;
    top: 30%;
    font-size: 30px;
    white-space: nowrap;
    display: none;
}
#correct-answer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
#line-2 {
    background: linear-gradient(transparent 30%, #00ff00 70%);
    border-radius: 10px;
}
</style>
</head>
<body>
<div class="left">
    <div class="record">
        <p id="record"><span id="points">0</span>問連続正解<span id="time">中です！</span></p>
        <p id="highscore-display">最高記録: <span id="highscore-points">0</span>問</p>
    </div>
    <div class="question">
        <p class="formula"><span id="number1">00</span><span id="times">×</span><span id="number2">00</span></p>
    </div>
    <div class="answer">
        <p class="equal">＝</p>
        <input type="number" id="answer-box" value="">
    </div>
</div>
<div class="right">
    <div class="evaluation">
        <p id="evaluation">不正解</p>
    </div>
    <div class="correct">
        <p id="correct-answer"><span id="line-1">正解は...</span><span id="line-2">"0000"</span><span id="line-3">でした。</span></p>
    </div>
</div>

<script>
let random_1, random_2, RightAnswer;
let AnswerBox = document.getElementById("answer-box");

// ローカルストレージから各種スコアを取得（なければ0）
let currentScore = parseInt(localStorage.getItem("mathCurrentScore")) || 0;
let lastScore = parseInt(localStorage.getItem("mathLastScore")) || 0;
let highScore = parseInt(localStorage.getItem("mathHighScore")) || 0;

// 初期化時に最高記録を表示
document.getElementById("highscore-points").textContent = highScore;

function random(start, end) {
    random_1 = Math.floor(Math.random() * (end - start + 1)) + start;
    random_2 = Math.floor(Math.random() * (end - start + 1)) + start;
}

function updateMessage() {
    let recordP = document.getElementById("record");
    
    if (currentScore > 0) {
        document.getElementById("points").textContent = currentScore;
        document.getElementById("time").textContent = "中です！";
        recordP.style.visibility = "visible";
    } else if (lastScore > 0) {
        document.getElementById("points").textContent = lastScore;
        document.getElementById("time").textContent = "でした！";
        recordP.style.visibility = "visible";
    } else {
        recordP.style.visibility = "hidden";
    }
}

function update() {
    random(11, 99);
    document.getElementById("number1").textContent = random_1;
    document.getElementById("number2").textContent = random_2;
    RightAnswer = random_1 * random_2;
    
    AnswerBox.value = "";
    document.getElementsByClassName("evaluation")[0].style.display = "none";
    document.getElementsByClassName("correct")[0].style.display = "none";
    
    // ページ読み込み時や問題更新時にメッセージを最新状態にする
    updateMessage();
    AnswerBox.focus();
}

function judge() {
    if (AnswerBox.value === "") return;

    let ValueAnswer = AnswerBox.value;
    
    if (String(RightAnswer) === ValueAnswer) {
        // 正解の処理
        currentScore += 1;
        lastScore = 0; 
        
        // ローカルストレージに現在のスコアを保存
        localStorage.setItem("mathCurrentScore", currentScore);
        localStorage.setItem("mathLastScore", lastScore);
        
        if (currentScore > highScore) {
            highScore = currentScore;
            localStorage.setItem("mathHighScore", highScore);
            document.getElementById("highscore-points").textContent = highScore;
        }

        document.getElementById("evaluation").textContent = "正解";
        document.getElementById("evaluation").style.color = "red";
        document.getElementsByClassName("evaluation")[0].style.display = "block";
    } else {
        // 不正解の処理
        lastScore = currentScore; 
        currentScore = 0;         
        
        // ローカルストレージにスコアを保存
        localStorage.setItem("mathCurrentScore", currentScore);
        localStorage.setItem("mathLastScore", lastScore);
        
        document.getElementById("evaluation").textContent = "不正解";
        document.getElementById("evaluation").style.color = "blue";
        document.getElementsByClassName("evaluation")[0].style.display = "block";
        document.getElementById("line-2").textContent = `"${RightAnswer}"`;
        document.getElementsByClassName("correct")[0].style.display = "block";
    }
    
    updateMessage();
    window.setTimeout(update, 1500);
}

AnswerBox.addEventListener("keydown", EnterJudge);
function EnterJudge(e) {
    if (e.key === "Enter" && !e.isComposing) {
        judge();
    }
}

// 最初の問題を描画
update();
</script>
</body>
</html>
